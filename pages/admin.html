<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Cafe Order System</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/admin.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
    <header>
        <h2>Admin Dashboard</h2>
        <button id="logoutBtn">Logout</button>
        <button id="menuMgmtBtn">Menu Management</button>
    </header>
    <main>
        <section>
            <h3>All Orders</h3>
            <div id="allOrdersList"></div>
            <div class="price-disclaimer">All prices in NPR. Menu images are for illustration.</div>
        </section>
        <section>
            <h3>Menu Management</h3>
            <div id="menuManagement"></div>
        </section>
        <section>
            <h3>Tips Tracking</h3>
            <div id="tipsTracking"></div>
        </section>
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        document.getElementById('logoutBtn').addEventListener('click', Auth.logout);
    </script>
</body>
</html>
