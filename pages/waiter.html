<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiter - Cafe Order System</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/waiter.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
    <header>
      <div class="brand-logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:10px;"><ellipse cx="18" cy="18" rx="18" ry="18" fill="#FF6B35"/>
          <path d="M12 24c0 2 2.5 3 6 3s6-1 6-3v-6h-12v6z" fill="#fff"/>
          <path d="M24 18c0-2.5-2.5-4-6-4s-6 1.5-6 4" stroke="#fff" stroke-width="2" fill="none"/>
          <ellipse cx="18" cy="14" rx="4" ry="1.5" fill="#fff"/>
        </svg>
        <span class="brand-title">Cafe POS</span>
      </div>
      <button id="logoutBtn">Logout</button>
    </header>
    <main>
        <section id="table-panel">
            <h3>Tables</h3>
            <div id="tablesGrid"></div>
        </section>
        <section id="kitchen-note-for-waiter">
            <h3>Kitchen Note</h3>
            <div id="waiterKitchenNote">Loading...</div>
        </section>
        <section id="order-section">
            <h3>New Order</h3>
            <button id="toggleDark">🌙</button>
            <form id="orderForm">
                <select id="orderType" required>
                    <option value="dinein">Dine In</option>
                    <option value="takeaway">Take Away</option>
                </select>
                <input type="number" id="tableNumber" placeholder="Table # (auto-filled for Dine In)" min="1" max="10" required>
                <input type="text" id="menuSearch" placeholder="Search menu (e.g. spicy, veg, momo)">
                <div id="favoritesBar"></div>
                <div id="menuGrid"></div>
                <div class="price-disclaimer">All prices in NPR. Menu images are for illustration.</div>
                <textarea id="orderNote" placeholder="Special instructions (optional)" rows="2"></textarea>
                <input type="number" id="tip" placeholder="Tip (optional, NPR)" min="0" step="1">
                <button type="submit">Send to Kitchen</button>
            </form>
        </section>
        <div id="orderSummaryPane">
            <div id="summaryItems">No items yet.</div>
            <button id="summaryCheckout">Checkout</button>
        </div>
        <div id="fabCluster">
            <button class="fab" id="fabNewOrder" title="New Order">➕</button>
            <button class="fab" id="fabClear" title="Clear">🧹</button>
            <button class="fab" id="fabHelp" title="Help">❓</button>
        </div>
        <section id="active-orders">
            <h3>Active Orders</h3>
            <div id="ordersList"></div>
        </section>
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/waiter.js"></script>
    <script>
        document.getElementById('logoutBtn').addEventListener('click', Auth.logout);
    </script>
</body>
</html>
