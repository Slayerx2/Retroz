<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - CaféPOS</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/login.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <script src="../js/config.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/login.js"></script>
</head>
<body>
  <main class="login-container">
    <div class="logo">☕ CaféPOS</div>
    <h1>Login</h1>
    <form id="login-form" autocomplete="off" novalidate>
      <label for="username">Username</label>
      <input type="text" id="username" required aria-required="true" aria-label="Username" autocomplete="username" />
      <label for="password">Password</label>
      <input type="password" id="password" required aria-required="true" aria-label="Password" autocomplete="current-password" />
      <label for="role">Select Role</label>
      <select id="role" required aria-required="true" aria-label="Select Role">
        <option value="waiter">Waiter</option>
        <option value="cook">Cook</option>
        <option value="admin">Admin</option>
      </select>
      <button type="submit">Login</button>
      <div id="error-msg"></div>
    </form>
  </main>
</body>
</html>
