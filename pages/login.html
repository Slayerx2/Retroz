<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - CaféPOS</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/login.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <script src="../js/config.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth-temp.js"></script>
</head>
<body>
  <main class="login-container">
    <div class="logo">☕ CaféPOS</div>
    <h1>Login</h1>
    <form id="login-form" autocomplete="off" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" required aria-required="true" aria-label="Username" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-input-wrapper">
          <input type="password" id="password" required aria-required="true" aria-label="Password" autocomplete="current-password" />
          <button type="button" id="toggle-password" aria-label="Show password" tabindex="0">
            <span class="eye-icon">👁️</span>
          </button>
        </div>
      </div>
      <div class="form-group checkbox-group">
        <input type="checkbox" id="remember-username" />
        <label for="remember-username">Remember username</label>
      </div>
      <button type="submit" id="login-btn">Login</button>
      <div id="error-msg" role="alert" aria-live="polite"></div>
    </form>
  </main>
</body>
</html>
